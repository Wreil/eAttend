<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eAttend — Employee Attendance System</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f1147 0%, #1a2a7c 35%, #1356a8 65%, #0b8fbd 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Animated grid ── */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 25s linear infinite;
            pointer-events: none;
        }
        @keyframes gridScroll {
            0%   { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        /* ── Floating orbs ── */
        .orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.25;
            animation: orbFloat ease-in-out infinite;
        }
        .orb1 { width: 340px; height: 340px; background: #4466ff; top: -80px; left: -80px; animation-duration: 14s; animation-delay: 0s; }
        .orb2 { width: 280px; height: 280px; background: #00c9e0; bottom: -60px; right: 5%; animation-duration: 18s; animation-delay: -5s; }
        .orb3 { width: 200px; height: 200px; background: #a855f7; top: 40%; left: 60%; animation-duration: 12s; animation-delay: -3s; }
        @keyframes orbFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-40px) scale(1.08); }
        }

        /* ── Particles ── */
        .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            animation: particleRise linear infinite;
        }
        @keyframes particleRise {
            0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-10vh)  rotate(540deg); opacity: 0; }
        }

        /* ── Main card ── */
        .landing-card {
            position: relative;
            z-index: 20;
            text-align: center;
            color: #fff;
            padding: 2.5rem 2rem;
            max-width: 600px;
            width: 100%;
        }

        /* ── Logo ── */
        .logo-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 2rem;
            animation: logoAppear 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        .logo-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            animation: ringPulse 3.5s ease-in-out 1.5s infinite;
        }
        .logo-ring-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1.5px dashed rgba(255,255,255,0.2);
            animation: spinSlow 18s linear infinite;
        }
        .logo-icon-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
        }
        @keyframes logoAppear {
            from { opacity: 0; transform: scale(0.3) rotate(-200deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(125,232,255,0.15), 0 0 40px rgba(255,255,255,0.1); }
            50%       { box-shadow: 0 0 0 12px rgba(125,232,255,0), 0 0 70px rgba(125,232,255,0.25); }
        }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ── Brand title ── */
        .brand-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: fadeSlideUp 0.7s ease 0.8s both;
            text-shadow: 0 6px 30px rgba(0,0,0,0.4);
        }
        .brand-title .accent { color: #7de8ff; }

        /* ── Tagline ── */
        .brand-tagline {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 2.5rem;
            animation: fadeSlideUp 0.7s ease 1s both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Feature pills ── */
        .features {
            display: flex;
            gap: 0.65rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            animation: fadeSlideUp 0.7s ease 1.2s both;
        }
        .pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 30px;
            padding: 0.45rem 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            transition: background 0.25s, transform 0.2s;
        }
        .pill:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .pill i { margin-right: 0.4rem; color: #7de8ff; }

        /* ── CTA button ── */
        .btn-start {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #fff;
            color: #1a1c5e;
            font-weight: 800;
            font-size: 1rem;
            padding: 0.9rem 2.4rem;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
            animation: fadeSlideUp 0.7s ease 1.4s both, ctaPulse 3s ease-in-out 2.2s infinite;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-start:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 14px 35px rgba(0,0,0,0.35);
        }
        .btn-start .arrow-icon {
            display: inline-flex;
            transition: transform 0.25s;
        }
        .btn-start:hover .arrow-icon { transform: translateX(4px); }
        @keyframes ctaPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(255,255,255,0.35); }
            50%       { box-shadow: 0 4px 35px rgba(255,255,255,0.6); }
        }

        /* ── Version badge ── */
        .version-badge {
            margin-top: 2.5rem;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            animation: fadeSlideUp 0.7s ease 1.8s both;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<div class="particles" id="particles"></div>

<div class="landing-card">

    <div class="logo-wrap">
        <div class="logo-ring-outer"></div>
        <div class="logo-ring"></div>
        <div class="logo-icon-inner">
            <i class="fas fa-clock"></i>
        </div>
    </div>

    <h1 class="brand-title">e<span class="accent">Attend</span></h1>
    <p class="brand-tagline">Attendance &amp; Leave Management System</p>

    <div class="features">
        <div class="pill"><i class="fas fa-fingerprint"></i>Time Tracking</div>
        <div class="pill"><i class="fas fa-calendar-check"></i>Leave Requests</div>
        <div class="pill"><i class="fas fa-chart-bar"></i>Analytics</div>
        <div class="pill"><i class="fas fa-users"></i>Team Overview</div>
    </div>

    <a href="/login/" class="btn-start" id="cta-btn">
        Get Started
        <span class="arrow-icon"><i class="fas fa-arrow-right"></i></span>
    </a>

    <p class="version-badge">eAttend v1.0 &bull; &copy; 2026</p>
</div>

<script>
    // ── Spawn floating particles ──
    (function spawnParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 22; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 24 + 6;
            p.style.cssText = [
                `width:${size}px`,
                `height:${size}px`,
                `left:${Math.random() * 100}%`,
                `animation-duration:${Math.random() * 14 + 10}s`,
                `animation-delay:${Math.random() * 12}s`
            ].join(';');
            container.appendChild(p);
        }
    })();

</script>

</body>
</html>
